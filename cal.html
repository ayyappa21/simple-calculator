<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple-calculator</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: hsl(0, 0%, 10%);
        }
        #calculator{
            text-align: center;
            background-color: hsl(0, 0%, 15%);
            max-width: 420px;
            height: auto;
            border-radius: 20px;
            overflow: hidden;
        }
        #equation{
            width: 100%;
            padding: 20px;
            background-color: hsl(0, 0%, 20%);
            border: none;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 50px;
            color: white;
            text-align: left;

        }
        #buttons{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap:10px;
            padding: 20px;
        }
        button{
            width: 80px;
            height: 80px;
            border-radius: 40px;
            cursor: pointer;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 30px;
            font-weight: bold;
            border: none;
        }
        #num{
            background-color: hsl(0, 0%, 63%);
        }
        #num:hover{
            background-color: hsl(0,0%,70%);
        }
        #num:active{
            background-color: hsl(0,0%,75%);
        }
        .operators{
            background-color: hsl(39, 100%, 50%);
        }
        .operators:hover{
            background-color: hsl(39,100%,45%);
        }
        .operators:active{
            background-color: hsl(39,100%,40%);
        }
    </style>
</head>
<body>
    <div id="calculator">
        <input id="equation" readonly>
        <div id="buttons">
            <button class="operators" onclick="appendtodiaplay('+')">+</button>
            <button id="num" onclick="appendtodiaplay('7')">7</button>
            <button id="num" onclick="appendtodiaplay('8')">8</button>
            <button id="num" onclick="appendtodiaplay('9')">9</button>
            <button class="operators" onclick="appendtodiaplay('-')">-</button>
            <button id="num" onclick="appendtodiaplay('4')">4</button>
            <button id="num" onclick="appendtodiaplay('5')">5</button>
            <button id="num" onclick="appendtodiaplay('6')">6</button>
            <button class="operators" onclick="appendtodiaplay('/')">/</button>
            <button id="num" onclick="appendtodiaplay('1')">1</button>
            <button id="num" onclick="appendtodiaplay('2')">2</button>
            <button id="num" onclick="appendtodiaplay('3')">3</button>
            <button class="operators" onclick="appendtodiaplay('*')">*</button>
            <button id="num" onclick="appendtodiaplay('0')">0</button>
            <button id="num" onclick="appendtodiaplay('.')">.</button>
            <button class="operators" id="evaluate">=</button>
            <button class="operators" id="clear">c</button>
        </div>
    </div>
<script>
    const equation=document.getElementById("equation");
    function appendtodiaplay(input){
        equation.value+=input;
    }
    document.getElementById("clear").onclick=()=>{
        equation.value="";
    }
    document.getElementById("evaluate").onclick=()=>{
        try{
            let ans=eval(equation.value);
            equation.value=ans;
        }
        catch{
            equation.value='Error'
        }
    }
</script>

</body>
</html>
